 sb.post('songs', batch);\n    imported += batch.length;\n    toast(`Importando... ${imported} / ${toInsert.length}`);\n  }\n\n  await loadData(); renderAll();\n  toast(`${imported} canciones importadas · ${skipped} duplicadas omitidas`);\n  input.value = '';\n}\n\n// ── PLAYLIST IMPORT ──\nasync function openPlaylistImport() {\n  document.getElementById('playlistModal').classList.remove('hidden');\n  document.getElementById('playlistModalBody').innerHTML = `<div style=\"font-size:12px;color:var(--text3);padding:1rem 0;\">Cargando tus playlists...<\u002Fdiv>`;\n\n  let playlists = [];\n  let offset = 0;\n  while (true) {\n    const data = await spFetch(`/me/playlists?limit=50&offset=${offset}`);\n    if (!data || !data.items) break;\n    playlists = playlists.concat(data.items);\n    if (data.items.length < 50) break;\n    offset += 50;\n  }\n\n  if (!playlists.length) {\n    document.getElementById('playlistModalBody').innerHTML = `<div style=\"font-size:12px;color:var(--text3);padding:1rem 0;\">No se encontraron playlists.<\u002Fdiv>`;\n    return;\n  }\n\n  window._playlists = playlists;\n\n  document.getElementById('playlistModalBody').innerHTML = `\n    <div style=\"font-size:11px;color:var(--text3);margin-bottom:10px;\">${playlists.length} playlists encontradas — elige una para importar<\u002Fdiv>\n    <div style=\"max-height:360px;overflow-y:auto;padding-right:4px;\" id=\"playlistList\"><\u002Fdiv>`;\n\n  const listEl = document.getElementById('playlistList');\n  playlists.forEach((p) => {\n    const img = p.images && p.images[0] ? p.images[0].url : '';\n    const count = p.tracks ? p.tracks.total : 0;\n    const div = document.createElement('div');\n    div.className = 'playlist-item';\n    div.innerHTML = `\n      ${img ? `<img class=\"playlist-cover\" src=\"${img}\" alt=\"\" />` : `<div class=\"playlist-cover\"><\u002Fdiv>`}\n      <div class=\"playlist-info\">\n        <div class=\"playlist-name\">${esc(p.name)}<\u002Fdiv>\n        <div class=\"playlist-meta\">${count > 0 ? count + ' canciones' : 'cargando...'}<\u002Fdiv>\n      <\u002Fdiv>\n      <span style=\"font-size:11px;color:var(--accent);\">Importar →<\u002Fspan>`;\n    div.addEventListener('click', () => importPlaylist(p.id, p.name, count));\n    listEl.appendChild(div);\n  });\n}\n\nasync function importPlaylist(playlistId, playlistName, totalTracks) {\n  const body = document.getElementById('playlistModalBody');\n  body.innerHTML = `\n    <div class=\"import-progress\">\n      <div style=\"font-weight:500;color:var(--text1);margin-bottom:4px;\">${esc(playlistName)}<\u002Fdiv>\n      <div id=\"importStatus\">Obteniendo canciones...<\u002Fdiv>\n      <div class=\"progress-bar-wrap\"><div class=\"progress-bar\" id=\"progressBar\"><\u002Fdiv><\u002Fdiv>\n      <div id=\"importDetail\" style=\"font-size:11px;color:var(--text3);\">0 / ${totalTracks}<\u002Fdiv>\n    <\u002Fdiv>`;\n\n  // Fetch all tracks from playlist\n  let tracks = [];\n  let offset = 0;\n  while (true) {\n    const data = await spFetch(`/playlists/${playlistId}/tracks?limit=100&offset=${offset}`);\n    console.log('Spotify tracks response:', data);\n    if (!data || !data.items) break;\n    const valid = data.items.filter(i => i && i.track && i.track.id && i.track.name).map(i => i.track);\n    tracks = tracks.concat(valid);\n    if (data.items.length < 100) break;\n    offset += 100;\n  }\n\n  // Filter out already imported\n  const existingSpIds = new Set(songs.map(s => s.spotify_id).filter(Boolean));\n  const toImport = tracks.filter(t => !existingSpIds.has(t.id));\n\n  document.getElementById('importStatus').textContent = `${toImport.length} canciones nuevas para importar`;\n  document.getElementById('importDetail').textContent = `(${tracks.length - toImport.length} ya están en tu biblioteca)`;\n\n  if (!toImport.length) {\n    document.getElementById('importStatus').textContent = 'Todas las canciones ya están en tu biblioteca';\n    document.getElementById('progressBar').style.width = '100%';\n    setTimeout(() => closeModal('playlistModal'), 2000);\n    return;\n  }\n\n  // Process in batches of 100 for audio features\n  let imported = 0;\n  const batchSize = 100;\n  for (let i = 0; i < toImport.length; i += batchSize) {\n    const batch = toImport.slice(i, i + batchSize);\n    const ids = batch.map(t => t.id).join(',');\n\n    document.getElementById('importStatus').textContent = `Obteniendo datos de audio...`;\n\n    const featData = await spFetch(`/audio-features?ids=${ids}`);\n    const featMap = {};\n    if (featData && featData.audio_features) {\n      featData.audio_features.forEach(f => { if (f) featMap[f.id] = f; });\n    }\n\n    for (const track of batch) {\n      const feat = featMap[track.id];\n      const camKey = feat ? (PITCH_TO_CAM[`${feat.key}_${feat.mode}`] || null) : null;\n      const cover = track.album?.images?.[2]?.url || track.album?.images?.[0]?.url || null;\n\n      await sb.post('songs', {\n        spotify_id: track.id,\n        title: track.name,\n        artist: track.artists.map(a => a.name).join(', '),\n        album: track.album?.name || null,\n        bpm: feat ? Math.round(feat.tempo) : null,\n        camelot_key: camKey,\n        cover_url: cover,\n        energy: feat?.energy || null\n      });\n\n      imported++;\n      const pct = Math.round((imported / toImport.length) * 100);\n      document.getElementById('progressBar').style.width = pct + '%';\n      document.getElementById('importStatus').textContent = `Importando canciones...`;\n      document.getElementById('importDetail').textContent = `${imported} / ${toImport.length}`;\n    }\n  }\n\n  document.getElementById('importStatus').textContent = `¡Listo! ${imported} canciones importadas`;\n  document.getElementById('importDetail').textContent = '';\n\n  await loadData(); renderAll();\n  toast(`${imported} canciones importadas de \"${playlistName}\"`);\n  setTimeout(() => closeModal('playlistModal'), 2000);\n}\n\n// ── SELECT ──\nfunction selectSong(id) {\n  if (selectMode) {\n    if (multiSelected.has(id)) multiSelected.delete(id);\n    else multiSelected.add(id);\n    updateBulkBar();\n    renderSongs();\n    return;\n  }\n  const song = songs.find(s => s.id === id);\n  selectedSong = selectedSong && selectedSong.id === id ? null : song;\n  renderAll();\n}\n\n// ── SELECTION MODE ──\nfunction toggleSelectMode() {\n  selectMode = !selectMode;\n  multiSelected.clear();\n  selectedSong = null;\n  const btn = document.getElementById('selectModeBtn');\n  if (btn) {\n    if (selectMode) {\n      btn.style.color = 'var(--accent)';\n      btn.innerHTML = '<span class=\"dd-icon\" style=\"color:var(--accent);\">⊞<\u002Fspan> Salir de selección';\n    } else {\n      btn.style.color = '';\n      btn.innerHTML = '<span class=\"dd-icon\">⊞<\u002Fspan> Modo selección';\n      document.getElementById('bulkBar').classList.add('hidden');\n    }\n  }\n  renderSongs();\n}\n\nfunction updateBulkBar() {\n  const bar = document.getElementById('bulkBar');\n  const count = multiSelected.size;\n  if (count === 0) { bar.classList.add('hidden'); return; }\n  bar.classList.remove('hidden');\n  document.getElementById('bulkCount').textContent = `${count} canción${count !== 1 ? 'es' : ''} seleccionada${count !== 1 ? 's' : ''}`;\n}\n\nfunction openBulkTag() {\n  if (!multiSelected.size) return;\n  document.getElementById('bulkTagSubtitle').textContent = `Se aplicará a ${multiSelected.size} canciones`;\n  document.getElementById('bulkTagGrid').innerHTML = tags.map(t =>\n    `<span class=\"mtag\" data-id=\"${t.id}\" onclick=\"this.classList.toggle('selected')\">${esc(t.name)}<\u002Fspan>`\n  ).join('');\n  document.getElementById('bulkTagModal').classList.remove('hidden');\n}\n\nasync function saveBulkTags() {\n  const selTags = [...document.querySelectorAll('#bulkTagGrid .mtag.selected')].map(el => el.dataset.id);\n  if (!selTags.length) { closeModal('bulkTagModal'); return; }\n\n  for (const songId of multiSelected) {\n    const existing = songTags.filter(st => st.song_id === songId).map(st => st.tag_id);\n    for (const tid of selTags) {\n      if (!existing.includes(tid)) {\n        await sb.post('song_tags', { song_id: songId, tag_id: tid });\n      }\n    }\n  }\n\n  await loadData();\n  closeModal('bulkTagModal');\n  toast(`Tags aplicados a ${multiSelected.size} canciones`);\n  renderAll();\n}\n\nasync function bulkDelete() {\n  const count = multiSelected.size;\n  if (!count) return;\n  if (!confirm(`¿Eliminar ${count} canción${count !== 1 ? 'es' : ''}? Esta acción no se puede deshacer.`)) return;\n\n  for (const id of multiSelected) {\n    await sb.deleteWhere('song_tags', 'song_id', id);\n    await sb.delete('songs', id);\n  }\n\n  multiSelected.clear();\n  await loadData();\n  toggleSelectMode();\n  renderAll();\n  toast(`${count} canciones eliminadas`);\n}\n\n// ── UPDATE COVERS ──\nasync function updateCovers() {\n  const toUpdate = songs.filter(s => s.spotify_id && !s.cover_url);\n  if (!toUpdate.length) { toast('Todas las canciones ya tienen portada'); return; }\n\n  toast(`Actualizando portadas de ${toUpdate.length} canciones...`);\n\n  const batchSize = 50;\n  let updated = 0;\n\n  for (let i = 0; i < toUpdate.length; i += batchSize) {\n    const batch = toUpdate.slice(i, i + batchSize);\n    const ids = batch.map(s => s.spotify_id).join(',');\n    const data = await spFetch(`/tracks?ids=${ids}`);\n    if (!data || !data.tracks) continue;\n\n    for (const track of data.tracks) {\n      if (!track) continue;\n      const cover = track.album?.images?.[1]?.url || track.album?.images?.[0]?.url || null;\n      if (!cover) continue;\n      const song = batch.find(s => s.spotify_id === track.id);\n      if (song) {\n        await sb.patch('songs', song.id, { cover_url: cover });\n        updated++;\n      }\n    }\n    toast(`Portadas: ${updated} / ${toUpdate.length}...`);\n  }\n\n  await loadData();\n  renderAll();\n  toast(`${updated} portadas actualizadas`);\n}\n\n// ── SIDEBAR TOGGLES ──\nconst sectionState = { sort: true, genre: true, camelot: true, energy: false, tags: true, playlists: false };\n\nfunction toggleSection(id) {\n  sectionState[id] = !sectionState[id];\n  const body = document.getElementById(`body-${id}`);\n  const arr = document.getElementById(`arr-${id}`);\n  if (sectionState[id]) { body.classList.remove('hidden'); arr.textContent = '▾'; }\n  else { body.classList.add('hidden'); arr.textContent = '▸'; }\n}\n\n// init collapsed sections\nfunction initSections() {\n  Object.entries(sectionState).forEach(([id, open]) => {\n    const body = document.getElementById(`body-${id}`);\n    const arr = document.getElementById(`arr-${id}`);\n    if (!body || !arr) return;\n    if (!open) { body.classList.add('hidden'); arr.textContent = '▸'; }\n    else { body.classList.remove('hidden'); arr.textContent = '▾'; }\n  });\n}\n\n// ── PLAYLISTS ──\nfunction renderSidebarPlaylists() {\n  const el = document.getElementById('playlistsList');\n  if (!el) return;\n  if (!playlists.length) {\n    el.innerHTML = `<div style=\"font-size:11px;color:var(--text3);\">Sin playlists aún<\u002Fdiv>`;\n    return;\n  }\n  el.innerHTML = playlists.map(p => {\n    const count = playlistSongs.filter(ps => ps.playlist_id === p.id).length;\n    return `<div class=\"pl-sidebar-item ${activePlaylistId===p.id?'active':''}\" onclick=\"openPlaylistPanel('${p.id}')\">\n      <span class=\"pl-sidebar-name\">▶ ${esc(p.name)}<\u002Fspan>\n      <span class=\"pl-sidebar-count\">${count}<\u002Fspan>\n    <\u002Fdiv>`;\n  }).join('');\n}\n\nasync function createPlaylist() {\n  const name = prompt('Nombre de la playlist:');\n  if (!name || !name.trim()) return;\n  await sb.post('playlists', { name: name.trim() });\n  await loadData();\n  renderSidebarPlaylists();\n  toast(`Playlist \"${name.trim()}\" creada`);\n}\n\nfunction openPlaylistPanel(id) {\n  activePlaylistId = id;\n  const pl = playlists.find(p => p.id === id);\n  if (!pl) return;\n  document.getElementById('playlistPanel').classList.remove('hidden');\n  document.getElementById('playlistPanelTitle').textContent = pl.name;\n  renderPlaylistPanel();\n  renderSidebarPlaylists();\n  setPlaylistView(window.__tweaks?.plView || 'list');\n}\n\nfunction closePlaylistPanel() {\n  activePlaylistId = null;\n  document.getElementById('playlistPanel').classList.add('hidden');\n  renderSidebarPlaylists();\n}\n\nfunction getPlaylistTracks(playlistId) {\n  const pSongs = playlistSongs.filter(ps => ps.playlist_id === playlistId).sort((a,b) => a.position - b.position);\n  return pSongs.map(ps => ({ ps, song: songs.find(s => s.id === ps.song_id) })).filter(x => x.song);\n}\n\nfunction renderPlaylistPanel() {\n  if (!activePlaylistId) return;\n  const tracks = getPlaylistTracks(activePlaylistId);\n  const meta = `${tracks.length} canción${tracks.length!==1?'es':''}`;\n  document.getElementById('playlistPanelMeta').textContent = meta;\n\n  const body = document.getElementById('playlistPanelBody');\n  if (!tracks.length) {\n    body.innerHTML = `<div class=\"pl-empty\">Sin canciones aún.<br>Arrastra canciones aquí<br>o usa el botón + en cada canción.<\u002Fdiv>`;\n    document.getElementById('setView').innerHTML = '';\n    document.getElementById('setHeaderStats').style.display = 'none';\n    return;\n  }\n\n  // ── LIST view: tracks with colored connectors between them ──\n  const useLabel = (window.__tweaks?.compatViz === 'label');\n  body.innerHTML = tracks.map(({ps, song}, i) => {\n    const prev = i > 0 ? tracks[i-1].song : null;\n    const info = prev ? camelotCompatInfo(prev.camelot_key, song.camelot_key) : null;\n    const connector = (i > 0 && info) ? (useLabel\n      ? `<div class=\"pl-compat\" style=\"color:var(--compat-${info.type});padding:6px 16px 6px 38px;font-family:var(--mono);font-size:10px;letter-spacing:0.06em;text-transform:uppercase;\">▸ ${esc(info.label)}${info.delta?' · '+esc(info.delta):''}<\u002Fdiv>`\n      : `<div class=\"pl-connector ${info.type}\">\n           <span class=\"pl-conn-label\">${esc(info.label)}<\u002Fspan>\n           ${info.delta ? `<span class=\"pl-conn-keys\">${esc(info.delta)}<\u002Fspan>` : ''}\n         <\u002Fdiv>`\n    ) : '';\n\n    return `${connector}\n    <div class=\"pl-track\" draggable=\"true\"\n      ondragstart=\"plDragStart(event,${i})\"\n      ondragover=\"plDragOver(event,${i})\"\n      ondrop=\"plDrop(event,${i})\"\n      ondragleave=\"plDragLeave(event)\"\n      ondragend=\"plDragEnd(event)\">\n      <span class=\"pl-track-num\">${i+1}<\u002Fspan>\n      <div class=\"pl-track-info\">\n        <div class=\"pl-track-name\">${esc(song.title)}<\u002Fdiv>\n        <div class=\"pl-track-artist\">${esc(song.artist)}${song.bpm?' · '+song.bpm+' bpm':''}${song.energy!=null?' · '+Math.round(song.energy*100)+'%':''}<\u002Fdiv>\n      <\u002Fdiv>\n      ${song.camelot_key ? `<span class=\"pl-track-cam cam-${song.camelot_key}\">${song.camelot_key}<\u002Fspan>` : ''}\n      <button class=\"pl-track-del\" onclick=\"removeFromPlaylist('${ps.id}')\" title=\"Quitar\">×<\u002Fbutton>\n    <\u002Fdiv>`;\n  }).join('');\n\n  // ── Set View: energy/BPM/key graph in chronological order ──\n  renderSetView(tracks);\n}\n\nfunction renderSetView(tracks) {\n  const setEl = document.getElementById('setView');\n  const stats = document.getElementById('setHeaderStats');\n  if (!setEl) return;\n\n  // Stats\n  const bpms = tracks.map(t => t.song.bpm).filter(Boolean);\n  const energies = tracks.map(t => t.song.energy).filter(e => e != null);\n  const bpmMin = bpms.length ? Math.min(...bpms) : null;\n  const bpmMax = bpms.length ? Math.max(...bpms) : null;\n  const eAvg = energies.length ? Math.round(energies.reduce((a,b) => a+b, 0) / energies.length * 100) : null;\n  // count compatibility flow\n  let perfect = 0, energyMix = 0, creative = 0, risky = 0;\n  for (let i = 1; i < tracks.length; i++) {\n    const info = camelotCompatInfo(tracks[i-1].song.camelot_key, tracks[i].song.camelot_key);\n    if (info.type === 'perfect') perfect++;\n    else if (info.type === 'energy') energyMix++;\n    else if (info.type === 'creative') creative++;\n    else if (info.type === 'risky') risky++;\n  }\n  stats.innerHTML = `\n    <div class=\"set-stat\">BPM<span class=\"v\">${bpmMin && bpmMax ? (bpmMin === bpmMax ? bpmMin : bpmMin + '–' + bpmMax) : '—'}<\u002Fspan><\u002Fdiv>\n    <div class=\"set-stat\">Energy<span class=\"v\">${eAvg != null ? eAvg + '%' : '—'}<\u002Fspan><\u002Fdiv>\n    <div class=\"set-stat\" title=\"Perfect / Energy / Creative / Risky transitions\">Flow<span class=\"v\" style=\"font-family:var(--mono);\">\n      <span style=\"color:var(--compat-perfect)\">${perfect}<\u002Fspan>·<span style=\"color:var(--compat-energy)\">${energyMix}<\u002Fspan>·<span style=\"color:var(--compat-creative)\">${creative}<\u002Fspan>·<span style=\"color:var(--compat-risky)\">${risky}<\u002Fspan>\n    <\u002Fspan><\u002Fdiv>\n  `;\n  stats.style.display = window.__tweaks?.plView === 'set' || document.getElementById('playlistPanel').dataset.view === 'set' ? 'flex' : 'none';\n\n  // Set rows + connectors\n  let html = '<div class=\"set-graph\">';\n  tracks.forEach(({ps, song}, i) => {\n    const e = song.energy != null ? Math.round(song.energy * 100) : null;\n    if (i > 0) {\n      const info = camelotCompatInfo(tracks[i-1].song.camelot_key, song.camelot_key);\n      html += `<div class=\"set-conn\"><div class=\"set-conn-bar ${info.type}\"><span class=\"conn-lbl\">${esc(info.label)}${info.delta?' · '+esc(info.delta):''}<\u002Fspan><\u002Fdiv><\u002Fdiv>`;\n    }\n    html += `<div class=\"set-row\">\n      <div class=\"set-num\">${i+1}<\u002Fdiv>\n      <div class=\"set-card\" draggable=\"true\"\n        ondragstart=\"plDragStart(event,${i})\"\n        ondragover=\"plDragOver(event,${i})\"\n        ondrop=\"plDrop(event,${i})\"\n        ondragleave=\"plDragLeave(event)\"\n        ondragend=\"plDragEnd(event)\">\n        ${song.camelot_key ? `<span class=\"set-cam-chip cam-${song.camelot_key}\">${song.camelot_key}<\u002Fspan>` : `<span class=\"set-cam-chip\" style=\"background:var(--bg4);color:var(--text3);\">—<\u002Fspan>`}\n        <div class=\"set-card-info\">\n          <div class=\"set-card-name\">${esc(song.title)}<\u002Fdiv>\n          <div class=\"set-card-sub\">${esc(song.artist)}${song.bpm?' · '+song.bpm+'bpm':''}<\u002Fdiv>\n        <\u002Fdiv>\n        <button class=\"pl-track-del\" style=\"opacity:1;\" onclick=\"removeFromPlaylist('${ps.id}')\" title=\"Quitar\">×<\u002Fbutton>\n      <\u002Fdiv>\n      <div class=\"set-energy\">\n        <div class=\"set-energy-bar\"><div class=\"fill\" style=\"width:${e!=null?e:0}%;\"><\u002Fdiv><\u002Fdiv>\n        <span>${e!=null?e+'%':'—'}<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>`;\n  });\n  html += '<\u002Fdiv>';\n  setEl.innerHTML = html;\n}\n\nfunction setPlaylistView(view) {\n  const p = document.getElementById('playlistPanel');\n  p.dataset.view = view;\n  document.querySelectorAll('.pl-view-toggle button').forEach(b => {\n    b.classList.toggle('active', b.dataset.view === view);\n  });\n  document.getElementById('playlistPanelBody').style.display = view === 'list' ? '' : 'none';\n  document.getElementById('setView').style.display = view === 'set' ? 'block' : 'none';\n  document.getElementById('setHeaderStats').style.display = view === 'set' ? 'flex' : 'none';\n  // persist without recursing\n  if (window.__tweaks) {\n    window.__tweaks.plView = view;\n    try { localStorage.setItem('dj_tweaks', JSON.stringify(window.__tweaks)); } catch(e) {}\n    document.querySelectorAll('.dj-tweak-seg[data-tweak=\"plView\"] button').forEach(b => {\n      b.classList.toggle('active', b.dataset.val === view);\n    });\n  }\n}\n\n// drag & drop within playlist\nfunction plDragStart(e, idx) {\n  dragSrcIndex = idx;\n  e.currentTarget.classList.add('dragging');\n  e.dataTransfer.effectAllowed = 'move';\n}\nfunction plDragOver(e, idx) {\n  e.preventDefault();\n  e.dataTransfer.dropEffect = 'move';\n  document.querySelectorAll('.pl-track').forEach(el => el.classList.remove('drag-over'));\n  e.currentTarget.classList.add('drag-over');\n}\nfunction plDragLeave(e) { e.currentTarget.classList.remove('drag-over'); }\nfunction plDragEnd(e) {\n  document.querySelectorAll('.pl-track').forEach(el => { el.classList.remove('dragging'); el.classList.remove('drag-over'); });\n}\nasync function plDrop(e, targetIdx) {\n  e.preventDefault();\n  if (dragSrcIndex === null || dragSrcIndex === targetIdx) return;\n  const tracks = getPlaylistTracks(activePlaylistId);\n  const moved = tracks.splice(dragSrcIndex, 1)[0];\n  tracks.splice(targetIdx, 0, moved);\n  // update positions\n  for (let i = 0; i < tracks.length; i++) {\n    await sb.patch('playlist_songs', tracks[i].ps.id, { position: i });\n  }\n  await loadData();\n  renderPlaylistPanel();\n  dragSrcIndex = null;\n}\n\n// drag from library to playlist\nfunction songDragStart(e, songId) {\n  e.dataTransfer.setData('songId', songId);\n  e.dataTransfer.effectAllowed = 'copy';\n}\n\nasync function addSongToPlaylist(songId, playlistId) {\n  const pid = playlistId || activePlaylistId;\n  if (!pid) { toast('Abre una playlist primero'); return; }\n  const existing = playlistSongs.filter(ps => ps.playlist_id === pid);\n  const alreadyIn = existing.find(ps => ps.song_id === songId);\n  if (alreadyIn) { toast('Ya está en la playlist'); return; }\n  const position = existing.length;\n  await sb.post('playlist_songs', { playlist_id: pid, song_id: songId, position });\n  await loadData();\n  renderPlaylistPanel();\n  renderSidebarPlaylists();\n  toast('Canción agregada');\n}\n\nasync function removeFromPlaylist(psId) {\n  await sb.delete('playlist_songs', psId);\n  await loadData();\n  renderPlaylistPanel();\n  renderSidebarPlaylists();\n}\n\nasync function deleteCurrentPlaylist() {\n  const pl = playlists.find(p => p.id === activePlaylistId);\n  if (!pl) return;\n  if (!confirm(`¿Eliminar la playlist \"${pl.name}\"?`)) return;\n  await sb.deleteWhere('playlist_songs', 'playlist_id', activePlaylistId);\n  await sb.delete('playlists', activePlaylistId);\n  closePlaylistPanel();\n  await loadData();\n  renderSidebarPlaylists();\n  toast('Playlist eliminada');\n}\n\nfunction exportCurrentPlaylist() {\n  const tracks = getPlaylistTracks(activePlaylistId);\n  if (!tracks.length) { toast('La playlist está vacía'); return; }\n  const text = tracks.map(({song}, i) => `${i+1}. ${song.title} — ${song.artist}${song.camelot_key?' ['+song.camelot_key+']':''}${song.bpm?' '+song.bpm+'bpm':''}`).join('\\n');\n  navigator.clipboard.writeText(text).then(() => toast(`Playlist copiada (${tracks.length} canciones)`));\n}\n\n// ── EXPORT ──\nfunction exportSet() {\n  const fs = filtered();\n  if (!fs.length) { toast('No hay canciones en la vista actual'); return; }\n  const text = fs.map(s => `${s.title} — ${s.artist}${s.camelot_key?' ['+s.camelot_key+']':''}${s.bpm?' '+s.bpm+'bpm':''}`).join('\\n');\n  navigator.clipboard.writeText(text).then(() => toast(`Set copiado (${fs.length} canciones)`));\n}\n\n// ── UTILS ──\nfunction esc(str) { return String(str||'').replace(/&/g,'&amp;').replace(/<\u002Fg,'&lt;').replace(/>/g,'&gt;').replace(/\"/g,'&quot;'); }\nfunction esc2(str) { return String(str||'').replace(/'/g,\"\\\\'\").replace(/\"/g,'&quot;'); }\n\nfunction toast(msg) {\n  const el = document.getElementById('toast');\n  el.textContent = msg; el.classList.remove('hidden');\n  clearTimeout(window._toastTimer);\n  window._toastTimer = setTimeout(() => el.classList.add('hidden'), 2800);\n}\n\n// ── KEYBOARD NAVIGATION ──\ndocument.addEventListener('keydown', e => {\n  // Ignore if typing in an input\n  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA' || e.target.tagName === 'SELECT') return;\n\n  const fs = filtered();\n  if (!fs.length) return;\n\n  if (e.key === 'Escape') {\n    if (selectMode) { toggleSelectMode(); return; }\n    selectedSong = null; renderAll(); return;\n  }\n\n  if (e.key === 'ArrowDown' || e.key === 'ArrowRight') {\n    e.preventDefault();\n    if (!selectedSong) { selectedSong = fs[0]; }\n    else {\n      const idx = fs.findIndex(s => s.id === selectedSong.id);\n      if (idx < fs.length - 1) selectedSong = fs[idx + 1];\n    }\n    renderAll();\n    scrollToSelected();\n    return;\n  }\n\n  if (e.key === 'ArrowUp' || e.key === 'ArrowLeft') {\n    e.preventDefault();\n    if (!selectedSong) { selectedSong = fs[fs.length - 1]; }\n    else {\n      const idx = fs.findIndex(s => s.id === selectedSong.id);\n      if (idx > 0) selectedSong = fs[idx - 1];\n    }\n    renderAll();\n    scrollToSelected();\n    return;\n  }\n\n  if ((e.key === 'Backspace' || e.key === 'Delete') && selectMode && multiSelected.size) {\n    e.preventDefault();\n    bulkDelete();\n    return;\n  }\n\n  if ((e.key === 'Backspace' || e.key === 'Delete') && selectedSong && !selectMode) {\n    e.preventDefault();\n    deleteSong(selectedSong.id);\n    return;\n  }\n});\n\nfunction scrollToSelected() {\n  if (!selectedSong) return;\n  const el = document.querySelector('.song-pill.selected');\n  if (el) el.scrollIntoView({ block: 'nearest', behavior: 'smooth' });\n}\n\n// ── INIT ──\nconst urlParams = new URLSearchParams(window.location.search);\nconst code = urlParams.get('code');\nif (code) {\n  handleCallback(code);\n} else {\n  const token = getStoredToken();\n  if (token) { launch(token); }\n}\n\n/* ════════════════════════════════════════════\n   DJ TOOL v2 — Topbar menus, Camelot wheel, Tweaks\n   ════════════════════════════════════════════ */\n\n// ── Topbar dropdown menus ──\nfunction toggleTbMenu(id, btn) {\n  const dropdown = document.getElementById(id);\n  const isOpen = !dropdown.classList.contains('hidden');\n  closeTbMenus();\n  if (!isOpen) {\n    dropdown.classList.remove('hidden');\n    btn.classList.add('open');\n  }\n}\nfunction closeTbMenus() {\n  document.querySelectorAll('.tb-dropdown').forEach(d => d.classList.add('hidden'));\n  document.querySelectorAll('.tb-menu-btn, .tb-icon-btn').forEach(b => b.classList.remove('open'));\n}\ndocument.addEventListener('mousedown', (e) => {\n  if (!e.target.closest('.tb-menu-wrap')) closeTbMenus();\n  if (!e.target.closest('.detail-kebab-wrap')) closeDetailKebab();\n});\n\n// ── Camelot Wheel ──\nfunction renderCamelotWheel() {\n  const wrap = document.getElementById('camelotWheel');\n  if (!wrap) return;\n\n  const cx = 100, cy = 100;\n  const rOuter = 96, rMid = 64, rInner = 28;\n\n  // Compatibility highlights based on selected song key\n  const compatList = selectedSong && selectedSong.camelot_key ? camelotCompat(selectedSong.camelot_key) : [];\n  const selectedKey = selectedSong?.camelot_key;\n\n  function wedgePath(startAngle, endAngle, ri, ro) {\n    const toRad = a => (a - 90) * Math.PI / 180;\n    const x1 = cx + ro * Math.cos(toRad(startAngle));\n    const y1 = cy + ro * Math.sin(toRad(startAngle));\n    const x2 = cx + ro * Math.cos(toRad(endAngle));\n    const y2 = cy + ro * Math.sin(toRad(endAngle));\n    const x3 = cx + ri * Math.cos(toRad(endAngle));\n    const y3 = cy + ri * Math.sin(toRad(endAngle));\n    const x4 = cx + ri * Math.cos(toRad(startAngle));\n    const y4 = cy + ri * Math.sin(toRad(startAngle));\n    const large = endAngle - startAngle > 180 ? 1 : 0;\n    return `M ${x1} ${y1} A ${ro} ${ro} 0 ${large} 1 ${x2} ${y2} L ${x3} ${y3} A ${ri} ${ri} 0 ${large} 0 ${x4} ${y4} Z`;\n  }\n  function labelPos(angle, r) {\n    const a = (angle - 90) * Math.PI / 180;\n    return [cx + r * Math.cos(a), cy + r * Math.sin(a)];\n  }\n\n  let svg = `<svg class=\"cam-wheel\" viewBox=\"0 0 200 200\" xmlns=\"http://www.w3.org/2000/svg\">`;\n  // 12 segments, starting at top (12 o'clock = num 12, going clockwise: 1,2,3...)\n  // Camelot wheel canonical order: 12 at top, 1 to the right, etc.\n  // We'll put position 0 at top = key \"12\", position 1 at 30° = key \"1\", ...\n  for (let pos = 0; pos < 12; pos++) {\n    const num = ((pos + 11) % 12) + 1; // pos 0 → 12, pos 1 → 1, pos 2 → 2 ...\n    const startA = pos * 30 - 15;\n    const endA = pos * 30 + 15;\n\n    // OUTER ring = B (major)\n    const keyB = num + 'B';\n    const activeB = filters.camelot.includes(keyB);\n    const compatB = compatList.includes(keyB) && !activeB;\n    const selB = selectedKey === keyB;\n    const clsB = `wedge cam-${keyB}${activeB ? ' active' : ''}${compatB ? ' compatible' : ''}${selB ? ' active' : ''}${(compatList.length && !activeB && !compatB && !selB) ? ' dim' : ''}`;\n    svg += `<path class=\"${clsB}\" d=\"${wedgePath(startA, endA, rMid+1, rOuter)}\" onclick=\"toggle('camelot','${keyB}')\"><\u002Fpath>`;\n    const [lxB, lyB] = labelPos(pos * 30, (rMid + rOuter) / 2);\n    const txtColorB = ['9B','10B','11B','12B','1B','2B','3B','4B','5B','6B','7B','8B'].includes(keyB) ? '#000' : '#000';\n    svg += `<text x=\"${lxB}\" y=\"${lyB}\" fill=\"${txtColorB}\" font-size=\"9\">${keyB}<\u002Ftext>`;\n\n    // INNER ring = A (minor)\n    const keyA = num + 'A';\n    const activeA = filters.camelot.includes(keyA);\n    const compatA = compatList.includes(keyA) && !activeA;\n    const selA = selectedKey === keyA;\n    const clsA = `wedge cam-${keyA}${activeA ? ' active' : ''}${compatA ? ' compatible' : ''}${selA ? ' active' : ''}${(compatList.length && !activeA && !compatA && !selA) ? ' dim' : ''}`;\n    svg += `<path class=\"${clsA}\" d=\"${wedgePath(startA, endA, rInner, rMid-1)}\" onclick=\"toggle('camelot','${keyA}')\"><\u002Fpath>`;\n    const [lxA, lyA] = labelPos(pos * 30, (rInner + rMid) / 2);\n    const txtColorA = (num >= 9) ? '#fff' : '#000';\n    svg += `<text x=\"${lxA}\" y=\"${lyA}\" fill=\"${txtColorA}\" font-size=\"8\">${keyA}<\u002Ftext>`;\n  }\n  // center\n  svg += `<circle cx=\"${cx}\" cy=\"${cy}\" r=\"${rInner - 2}\" fill=\"var(--bg)\" stroke=\"var(--border2)\" stroke-width=\"1\"/>`;\n  svg += `<text x=\"${cx}\" y=\"${cy-3}\" fill=\"var(--text3)\" font-size=\"8\" font-family=\"var(--mono)\" letter-spacing=\"1\">CAMELOT<\u002Ftext>`;\n  svg += `<text x=\"${cx}\" y=\"${cy+8}\" fill=\"var(--text1)\" font-size=\"11\" font-weight=\"700\">${selectedKey || (filters.camelot[0] || '—')}<\u002Ftext>`;\n  svg += `<\u002Fsvg>`;\n\n  wrap.innerHTML = svg;\n}\n\n// extend renderSidebar to also render the wheel\nconst _origRenderSidebar = renderSidebar;\nrenderSidebar = function() {\n  _origRenderSidebar();\n  renderCamelotWheel();\n};\n\nfunction setCamelotView(view) {\n  const sec = document.getElementById('sec-camelot');\n  if (sec) sec.dataset.view = view;\n  document.getElementById('camModeGrid')?.classList.toggle('active', view === 'grid');\n  document.getElementById('camModeWheel')?.classList.toggle('active', view === 'wheel');\n  // persist without recursing\n  if (window.__tweaks) {\n    window.__tweaks.camView = view;\n    try { localStorage.setItem('dj_tweaks', JSON.stringify(window.__tweaks)); } catch(e) {}\n    document.querySelectorAll('.dj-tweak-seg[data-tweak=\"camView\"] button').forEach(b => {\n      b.classList.toggle('active', b.dataset.val === view);\n    });\n  }\n  if (view === 'wheel') renderCamelotWheel();\n}\n\n// ── Tweaks engine ──\nwindow.__tweaks = {\n  songPill: 'compact',\n  camView: 'grid',\n  compatViz: 'connector',\n  plView: 'list'\n};\n\nwindow.__djTweaks = {\n  show() {\n    document.getElementById('djTweaks').classList.add('visible');\n  },\n  hide() {\n    document.getElementById('djTweaks').classList.remove('visible');\n  },\n  set(key, val) {\n    window.__tweaks[key] = val;\n    try { localStorage.setItem('dj_tweaks', JSON.stringify(window.__tweaks)); } catch(e) {}\n    // Sync UI buttons\n    document.querySelectorAll(`.dj-tweak-seg[data-tweak=\"${key}\"] button`).forEach(b => {\n      b.classList.toggle('active', b.dataset.val === val);\n    });\n    // Re-apply\n    if (key === 'camView') setCamelotView(val);\n    if (key === 'plView' && activePlaylistId) setPlaylistView(val);\n    if (key === 'songPill') renderSongs();\n    if (key === 'compatViz' && activePlaylistId) renderPlaylistPanel();\n  },\n  init() {\n    try {\n      const stored = JSON.parse(localStorage.getItem('dj_tweaks') || '{}');\n      Object.assign(window.__tweaks, stored);\n    } catch(e) {}\n    // Wire up segment buttons\n    document.querySelectorAll('.dj-tweak-seg').forEach(seg => {\n      const key = seg.dataset.tweak;\n      const val = window.__tweaks[key];\n      seg.querySelectorAll('button').forEach(b => {\n        b.classList.toggle('active', b.dataset.val === val);\n        b.addEventListener('click', () => window.__djTweaks.set(key, b.dataset.val));\n      });\n    });\n    // Apply persisted state\n    setCamelotView(window.__tweaks.camView);\n  }\n};\n\n// Initialize tweaks once DOM is ready\nif (document.readyState === 'loading') {\n  document.addEventListener('DOMContentLoaded', () => window.__djTweaks.init());\n} else {\n  window.__djTweaks.init();\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
